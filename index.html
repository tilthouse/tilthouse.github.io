<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tilthouse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink: #1a1714;
      --cream: #f4f0e8;
      --warm: #d4c5a9;
      --accent: #c2653a;
      --muted: #9a9081;
    }

    html { height: 100%; }

    body {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream);
      color: var(--ink);
      font-family: 'Instrument Sans', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.035;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    /* diagonal line texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.018;
      background-image: repeating-linear-gradient(
        -45deg,
        var(--ink) 0px,
        var(--ink) 1px,
        transparent 1px,
        transparent 18px
      );
    }

    .container {
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    /* tilted frame */
    .frame {
      display: inline-block;
      padding: 3.5rem 5rem;
      border: 1.5px solid var(--warm);
      position: relative;
      transform: rotate(-1.8deg);
      animation: settle 1.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes settle {
      0% {
        opacity: 0;
        transform: rotate(-4deg) translateY(20px);
      }
      100% {
        opacity: 1;
        transform: rotate(-1.8deg) translateY(0);
      }
    }

    .frame::before {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px solid var(--warm);
      opacity: 0.5;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-weight: 400;
      font-size: clamp(3rem, 8vw, 5.5rem);
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--ink);
      margin-bottom: 0.15em;
    }

    h1 .accent {
      color: var(--accent);
      font-style: italic;
    }

    .divider {
      width: 40px;
      height: 1.5px;
      background: var(--accent);
      margin: 1.2rem auto;
      animation: grow 1s 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes grow {
      from { width: 0; opacity: 0; }
      to { width: 40px; opacity: 1; }
    }

    .tagline {
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      animation: fade 1.2s 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* corner flourishes */
    .corner {
      position: fixed;
      width: 80px;
      height: 80px;
      opacity: 0.12;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--accent);
    }
    .corner--tl { top: 2rem; left: 2rem; }
    .corner--tl::before { width: 40px; height: 1.5px; top: 0; left: 0; }
    .corner--tl::after { width: 1.5px; height: 40px; top: 0; left: 0; }
    .corner--br { bottom: 2rem; right: 2rem; }
    .corner--br::before { width: 40px; height: 1.5px; bottom: 0; right: 0; }
    .corner--br::after { width: 1.5px; height: 40px; bottom: 0; right: 0; }

    @media (max-width: 600px) {
      .frame { padding: 2.5rem 2.5rem; }
      .corner { display: none; }
    }
  </style>
</head>
<body>
  <div class="corner corner--tl"></div>
  <div class="corner corner--br"></div>
  <main class="container">
    <div class="frame">
      <h1>Tilt<span class="accent">house</span></h1>
      <div class="divider"></div>
      <p class="tagline">More to come</p>
    </div>
  </main>
</body>
</html>
